<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="发现精选好物 — 优质商品展示平台">
  <title>我的商城</title>
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="dns-prefetch" href="https://images.unsplash.com">
  <style>
    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                   "Helvetica Neue", Arial, sans-serif;
      color: #333; background: #f5f5f5; line-height: 1.5;
    }
    img { display: block; max-width: 100%; }

    /* ===== Variables ===== */
    :root {
      --jd-red: #E4393C;
      --jd-red-hover: #c12e30;
      --jd-bg: #f5f5f5;
      --card-shadow: 0 1px 4px rgba(0,0,0,0.08);
      --card-shadow-hover: 0 8px 24px rgba(0,0,0,0.12);
      --radius: 8px;
    }

    /* ===== Header ===== */
    .header {
      background: #fff; border-bottom: 2px solid var(--jd-red);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 1280px; margin: 0 auto; padding: 12px 20px;
      display: flex; align-items: center; gap: 20px;
    }
    .logo {
      font-size: 24px; font-weight: 700; color: var(--jd-red);
      white-space: nowrap; letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .search-wrap {
      flex: 1; max-width: 520px; position: relative;
    }
    .search-wrap input {
      width: 100%; padding: 10px 44px 10px 16px;
      border: 2px solid var(--jd-red); border-radius: 4px;
      font-size: 14px; outline: none; background: #fff;
    }
    .search-wrap input:focus { border-color: #c12e30; }
    .search-wrap .search-btn {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 42px; border: none; background: var(--jd-red);
      color: #fff; font-size: 18px; cursor: pointer;
      border-radius: 0 4px 4px 0;
    }
    .search-wrap .search-btn:hover { background: var(--jd-red-hover); }

    /* ===== Toolbar ===== */
    .toolbar {
      max-width: 1280px; margin: 0 auto; padding: 16px 20px 0;
    }
    /* Category Filters */
    .category-bar {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
    }
    .category-bar .cat-btn {
      padding: 6px 16px; border: 1px solid #ddd; border-radius: 4px;
      background: #fff; color: #666; font-size: 13px; cursor: pointer;
      transition: all .2s;
    }
    .category-bar .cat-btn:hover { border-color: var(--jd-red); color: var(--jd-red); }
    .category-bar .cat-btn.active { background: var(--jd-red); color: #fff; border-color: var(--jd-red); }

    /* Sort + Info */
    .sort-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 16px; padding: 10px 14px;
      background: #fff; border-radius: var(--radius);
    }
    .sort-bar .sort-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .sort-bar .sort-btn {
      padding: 5px 14px; border: 1px solid #ddd; border-radius: 4px;
      background: #fff; color: #666; font-size: 13px; cursor: pointer;
      transition: all .2s;
    }
    .sort-bar .sort-btn:hover { border-color: var(--jd-red); color: var(--jd-red); }
    .sort-bar .sort-btn.active { background: var(--jd-red); color: #fff; border-color: var(--jd-red); }
    .sort-bar .product-info { font-size: 13px; color: #999; }
    .sort-bar .product-info strong { color: var(--jd-red); font-weight: 600; }

    /* ===== Main Content ===== */
    .main-content { max-width: 1280px; margin: 0 auto; padding: 16px 20px 40px; }

    /* Loading */
    .loading-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px;
    }
    .loading-state .spinner {
      width: 40px; height: 40px; border: 4px solid #eee;
      border-top-color: var(--jd-red); border-radius: 50%;
      animation: spin .75s linear infinite; margin-bottom: 14px;
    }
    .loading-state p { font-size: 14px; color: #999; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error / Empty */
    .error-state, .empty-state {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; text-align: center;
    }
    .error-state .icon, .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .error-state h2, .empty-state h2 { font-size: 18px; margin-bottom: 6px; color: #333; }
    .error-state p, .empty-state p { font-size: 14px; color: #999; margin-bottom: 16px; }
    .error-state .retry-btn {
      padding: 10px 28px; background: var(--jd-red); color: #fff;
      border: none; border-radius: 4px; font-size: 14px; cursor: pointer;
    }
    .error-state .retry-btn:hover { background: var(--jd-red-hover); }

    /* ===== Product Grid ===== */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px; opacity: 0; transition: opacity .4s;
    }
    .product-grid.visible { opacity: 1; }

    /* ===== Product Card ===== */
    .product-card {
      background: #fff; border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: transform .2s, box-shadow .2s;
      display: flex; flex-direction: column; cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-shadow-hover);
    }
    .product-card .card-img {
      width: 100%; aspect-ratio: 1/1; background: #f0f0f0;
      overflow: hidden; position: relative;
    }
    .product-card .card-img img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .4s, opacity .3s; opacity: 0;
    }
    .product-card .card-img img.loaded { opacity: 1; }
    .product-card:hover .card-img img { transform: scale(1.05); }
    .product-card .card-img .tag {
      position: absolute; top: 8px; left: 8px;
      background: var(--jd-red); color: #fff;
      font-size: 11px; padding: 2px 8px; border-radius: 2px;
    }
    .product-card .card-body { padding: 12px 14px 16px; flex: 1; display: flex; flex-direction: column; }
    .product-card .card-title {
      font-size: 14px; font-weight: 400; line-height: 1.5; color: #333;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 6px;
    }
    .product-card .card-title:hover { color: var(--jd-red); }
    .product-card .card-price {
      font-size: 20px; font-weight: 700; color: var(--jd-red);
      margin-bottom: 6px;
    }
    .product-card .card-price .price-symbol { font-size: 14px; font-weight: 500; }
    .product-card .card-desc {
      font-size: 12px; color: #999; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; flex: 1;
    }

    /* ===== Pagination ===== */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 4px; margin-top: 32px; flex-wrap: wrap;
    }
    .pagination .page-btn {
      min-width: 36px; height: 36px; padding: 0 10px;
      border: 1px solid #ddd; border-radius: 4px;
      background: #fff; color: #666; font-size: 14px;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .pagination .page-btn:hover { border-color: var(--jd-red); color: var(--jd-red); }
    .pagination .page-btn.active {
      background: var(--jd-red); color: #fff; border-color: var(--jd-red);
    }
    .pagination .page-btn.disabled {
      color: #ccc; cursor: not-allowed; border-color: #eee;
    }
    .pagination .page-btn.disabled:hover { border-color: #eee; color: #ccc; }
    .pagination .page-ellipsis {
      padding: 0 4px; color: #999; font-size: 14px;
    }


    /* ===== Contact Modal ===== */
    .modal-overlay {
      display: none; position: fixed; z-index: 999;
      inset: 0; background: rgba(0,0,0,0.4);
      align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: #fff; border-radius: 12px; padding: 32px 28px 28px;
      max-width: 360px; width: 90%; box-shadow: 0 16px 48px rgba(0,0,0,0.18);
      position: relative; animation: modalIn .3s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.92) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-box .modal-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none; font-size: 22px;
      color: #999; cursor: pointer; line-height: 1;
    }
    .modal-box .modal-close:hover { color: #333; }
    .modal-box .modal-title {
      font-size: 17px; font-weight: 600; color: #333;
      margin-bottom: 20px; padding-right: 20px;
    }
    .modal-box .modal-field {
      display: flex; align-items: center;
      padding: 12px 0; border-bottom: 1px solid #f0f0f0;
    }
    .modal-box .modal-field:last-child { border-bottom: none; }
    .modal-box .modal-field .label {
      width: 70px; font-size: 14px; color: #999; flex-shrink: 0;
    }
    .modal-box .modal-field .value {
      flex: 1; font-size: 15px; color: #333; font-weight: 500;
    }
    .modal-box .modal-field .copy-btn {
      padding: 4px 12px; border: 1px solid var(--jd-red);
      background: #fff; color: var(--jd-red); border-radius: 4px;
      font-size: 12px; cursor: pointer; transition: all .2s;
    }
    .modal-box .modal-field .copy-btn:hover {
      background: var(--jd-red); color: #fff;
    }
    .modal-box .modal-field .copy-btn.copied {
      background: #52c41a; border-color: #52c41a; color: #fff;
    }
    .contact-btn {
      display: inline-block; margin-top: 8px;
      padding: 6px 14px; border: 1px solid var(--jd-red);
      background: #fff; color: var(--jd-red); border-radius: 4px;
      font-size: 12px; cursor: pointer; transition: all .2s;
      text-align: center;
    }
    .contact-btn:hover { background: var(--jd-red); color: #fff; }
    /* ===== Footer ===== */
    .footer {
      border-top: 1px solid #eee; padding: 20px 0;
      text-align: center; font-size: 12px; color: #ccc;
    }

    /* ===== Card Animations ===== */
    .product-card {
      animation: cardIn .35s ease backwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Category bar hidden ===== */
    .category-bar.hidden { display: none; }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .product-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    }
    @media (max-width: 600px) {
      .header-inner { padding: 10px 12px; gap: 10px; flex-wrap: wrap; }
      .logo { font-size: 20px; }
      .search-wrap { max-width: 100%; }
      .toolbar { padding: 12px 12px 0; }
      .main-content { padding: 12px 12px 30px; }
      .product-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .product-card .card-body { padding: 10px 12px 14px; }
      .product-card .card-title { font-size: 13px; }
      .product-card .card-price { font-size: 17px; }
      .sort-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
    @media (max-width: 380px) {
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ===== Header ===== -->
<header class="header">
  <div class="header-inner">
    <div class="logo">&#x2605; 我的商城</div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="搜索商品…" autocomplete="off">
      <button class="search-btn">&#x1F50D;</button>
    </div>
  </div>
</header>

<!-- ===== Toolbar ===== -->
<div class="toolbar">
  <div class="category-bar" id="categoryBar"></div>
  <div class="sort-bar">
    <div class="sort-group">
      <button class="sort-btn" data-sort="default">默认</button>
      <button class="sort-btn" data-sort="price-asc">价格从低到高</button>
      <button class="sort-btn" data-sort="price-desc">价格从高到低</button>
    </div>
    <div class="product-info">共 <strong id="totalCount">0</strong> 件商品</div>
  </div>
</div>

<!-- ===== Main ===== -->
<main class="main-content">
  <!-- Loading -->
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>正在加载商品数据…</p>
  </div>

  <!-- Error -->
  <div class="error-state" id="errorState">
    <div class="icon">&#x26A0;</div>
    <h2>加载失败</h2>
    <p>无法获取商品数据，请检查网络后重试。</p>
    <button class="retry-btn" id="retryBtn">重新加载</button>
  </div>

  <!-- Empty -->
  <div class="empty-state" id="emptyState">
    <div class="icon">&#x1F4E6;</div>
    <h2>暂无商品</h2>
    <p id="emptyMsg">没有找到匹配的商品。</p>
  </div>

  <!-- Grid -->
  <div class="product-grid" id="productGrid"></div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>
</main>

<!-- ===== Footer ===== -->

<!-- ===== Contact Modal ===== -->
<div class="modal-overlay" id="contactModal">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-title" id="modalProductTitle">联系商家</div>
    <div class="modal-field">
      <span class="label">📞 电话</span>
      <span class="value" id="modalPhone">-</span>
      <button class="copy-btn" data-copy="phone">复制</button>
    </div>
    <div class="modal-field">
      <span class="label">💬 微信</span>
      <span class="value" id="modalWechat">-</span>
      <button class="copy-btn" data-copy="wechat">复制</button>
    </div>
  </div>
</div>
<footer class="footer">
  <div class="container">&copy; 2026 我的商城 &mdash; 用心发现好物</div>
</footer>

<script>
(function () {
  'use strict';

  const DATA_URL = 'https://api.github.com/repos/WHNXBB/Lijing-sshop/contents/products.json';
  const PAGE_SIZE = 24;

  // DOM refs
  var $grid        = document.getElementById('productGrid');
  var $loading     = document.getElementById('loadingState');
  var $error       = document.getElementById('errorState');
  var $empty       = document.getElementById('emptyState');
  var $emptyMsg    = document.getElementById('emptyMsg');
  var $retryBtn    = document.getElementById('retryBtn');
  var $searchInput = document.getElementById('searchInput');
  var $totalCount  = document.getElementById('totalCount');
  var $categoryBar = document.getElementById('categoryBar');
  var $pagination  = document.getElementById('pagination');
  var $sortBtns    = document.querySelectorAll('.sort-btn');

  // State
  var allProducts    = [];
  var filteredProducts = [];
  var currentPage    = 1;
  var currentCategory = 'all';
  var currentSort    = 'default';
  var currentQuery   = '';
  var hasCategory    = false;

  /* ---------- State Helpers ---------- */
  function showLoading() {
    $loading.style.display = 'flex';
    $error.style.display = 'none';
    $empty.style.display = 'none';
    $grid.classList.remove('visible');
    $grid.innerHTML = '';
    $pagination.innerHTML = '';
  }

  function showError() {
    $loading.style.display = 'none';
    $error.style.display = 'flex';
    $empty.style.display = 'none';
    $grid.classList.remove('visible');
    $pagination.innerHTML = '';
  }

  function showEmpty(msg) {
    $loading.style.display = 'none';
    $error.style.display = 'none';
    $empty.style.display = 'flex';
    $emptyMsg.textContent = msg || '没有找到匹配的商品。';
    $grid.classList.remove('visible');
    $grid.innerHTML = '';
    $pagination.innerHTML = '';
  }

  function showGrid() {
    $loading.style.display = 'none';
    $error.style.display = 'none';
    $empty.style.display = 'none';
  }

  /* ---------- Category ---------- */
  function buildCategories(products) {
    var cats = {};
    products.forEach(function (p) {
      if (p.category) {
        cats[p.category] = true;
      }
    });
    var keys = Object.keys(cats);
    hasCategory = keys.length > 0;

    $categoryBar.innerHTML = '';

    if (!hasCategory) {
      $categoryBar.classList.add('hidden');
      return;
    }
    $categoryBar.classList.remove('hidden');

    // "全部" btn
    var allBtn = document.createElement('button');
    allBtn.className = 'cat-btn active';
    allBtn.textContent = '全部商品';
    allBtn.dataset.cat = 'all';
    allBtn.addEventListener('click', function () { switchCategory('all'); });
    $categoryBar.appendChild(allBtn);

    keys.sort();
    keys.forEach(function (cat) {
      var btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.textContent = cat;
      btn.dataset.cat = cat;
      btn.addEventListener('click', function () { switchCategory(cat); });
      $categoryBar.appendChild(btn);
    });
  }

  function switchCategory(cat) {
    currentCategory = cat;
    currentPage = 1;
    // Update button styles
    var btns = $categoryBar.querySelectorAll('.cat-btn');
    btns.forEach(function (b) {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
    applyFilters();
  }

  /* ---------- Sort ---------- */
  $sortBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      var sort = this.dataset.sort;
      if (sort === currentSort) return;
      currentSort = sort;
      $sortBtns.forEach(function (b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentPage = 1;
      applyFilters();
    });
  });
  // Default active
  document.querySelector('.sort-btn[data-sort="default"]').classList.add('active');

  /* ---------- Search ---------- */
  var searchTimer = null;
  $searchInput.addEventListener('input', function () {
    if (searchTimer) clearTimeout(searchTimer);
    searchTimer = setTimeout(function () {
      currentQuery = $searchInput.value.trim();
      currentPage = 1;
      applyFilters();
    }, 200);
  });

  /* ---------- Filter + Sort + Paginate ---------- */
  function applyFilters() {
    // 1. Search filter
    var list = allProducts.slice();
    if (currentQuery) {
      var q = currentQuery.toLowerCase();
      list = list.filter(function (p) {
        return (p.title && p.title.toLowerCase().indexOf(q) !== -1)
            || (p.description && p.description.toLowerCase().indexOf(q) !== -1);
      });
    }

    // 2. Category filter
    if (hasCategory && currentCategory !== 'all') {
      list = list.filter(function (p) { return p.category === currentCategory; });
    }

    // 3. Sort
    if (currentSort === 'price-asc') {
      list.sort(function (a, b) { return parseFloat(a.price) - parseFloat(b.price); });
    } else if (currentSort === 'price-desc') {
      list.sort(function (a, b) { return parseFloat(b.price) - parseFloat(a.price); });
    }

    filteredProducts = list;
    $totalCount.textContent = list.length;

    if (list.length === 0) {
      showEmpty('没有找到匹配的商品。');
      return;
    }

    // 4. Paginate
    var totalPages = Math.ceil(list.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = totalPages;
    var start = (currentPage - 1) * PAGE_SIZE;
    var pageItems = list.slice(start, start + PAGE_SIZE);

    renderProducts(pageItems);
    renderPagination(totalPages);
  }

  /* ---------- Render Cards ---------- */
  function renderProducts(products) {
    showGrid();
    var fragment = document.createDocumentFragment();
    products.forEach(function (product, idx) {
      var card = document.createElement('div');
      card.className = 'product-card';
      card.style.animationDelay = ((idx % 10) * 0.03) + 's';

      var imgDiv = document.createElement('div');
      imgDiv.className = 'card-img';

      if (hasCategory && product.category) {
        var tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = product.category;
        imgDiv.appendChild(tag);
      }

      var img = document.createElement('img');
      img.src = product.image || '';
      img.alt = product.title || '商品';
      img.loading = 'lazy';
      img.width = 400;
      img.height = 400;
      img.addEventListener('load', function onLoad() {
        img.classList.add('loaded');
        img.removeEventListener('load', onLoad);
      });
      img.addEventListener('error', function () { img.style.display = 'none'; });
      imgDiv.appendChild(img);

      var body = document.createElement('div');
      body.className = 'card-body';

      var title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = product.title || '未命名商品';

      var price = document.createElement('div');
      price.className = 'card-price';
      var priceVal = parseFloat(product.price);
      if (!isNaN(priceVal)) {
        price.innerHTML = '<span class="price-symbol">¥</span>' + priceVal.toFixed(2);
      } else {
        price.textContent = product.price || '';
      }

      var desc = document.createElement('div');
      desc.className = 'card-desc';
      desc.textContent = product.description || '暂无描述';

      body.appendChild(title);
      body.appendChild(price);
      body.appendChild(desc);

      var contactBtn = document.createElement("button");
      contactBtn.className = "contact-btn";
      contactBtn.textContent = "📞 联系商家";
      contactBtn.dataset.phone = product.phone || "";
      contactBtn.dataset.wechat = product.wechat || "";
      contactBtn.dataset.title = product.title || "";
      contactBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        openContactModal(this.dataset);
      });
      body.appendChild(contactBtn);
      card.appendChild(imgDiv);
      card.appendChild(body);
      fragment.appendChild(card);
    });

    $grid.innerHTML = '';
    $grid.appendChild(fragment);
    requestAnimationFrame(function () { $grid.classList.add('visible'); });
  }

  /* ---------- Pagination ---------- */
  function renderPagination(totalPages) {
    if (totalPages <= 1) {
      $pagination.innerHTML = '';
      return;
    }
    var html = '';

    // Prev
    html += '<button class="page-btn' + (currentPage <= 1 ? ' disabled' : '') + '" data-page="' + (currentPage - 1) + '"' + (currentPage <= 1 ? ' disabled' : '') + '>&#x2039;</button>';

    // Page numbers
    var range = getPageRange(currentPage, totalPages);
    for (var i = range.start; i <= range.end; i++) {
      if (i === -1) {
        html += '<span class="page-ellipsis">…</span>';
        continue;
      }
      html += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
    }

    // Next
    html += '<button class="page-btn' + (currentPage >= totalPages ? ' disabled' : '') + '" data-page="' + (currentPage + 1) + '"' + (currentPage >= totalPages ? ' disabled' : '') + '>&#x203A;</button>';

    $pagination.innerHTML = html;

    // Bind click
    $pagination.querySelectorAll('.page-btn:not(.disabled)').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var p = parseInt(this.dataset.page);
        if (!isNaN(p) && p >= 1 && p <= totalPages) {
          currentPage = p;
          applyFilters();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    });
  }

  function getPageRange(current, total) {
    var range = { start: 1, end: total };
    if (total <= 7) return range;

    if (current <= 4) {
      return { start: 1, end: 5, ellipsis: total };
    }
    if (current >= total - 3) {
      return { start: total - 4, end: total, ellipsis: 1 };
    }
    return { start: current - 2, end: current + 2, ellipsis: true };
  }

  // Apply page range with ellipsis
  var origImpl = getPageRange;
  getPageRange = function (current, total) {
    var r = origImpl(current, total);
    var pages = [];
    if (r.ellipsis === true) {
      pages.push(1);
      pages.push(-1); // ellipsis
      for (var i = r.start; i <= r.end; i++) pages.push(i);
      pages.push(-1);
      pages.push(total);
      return { start: 1, end: total, pages: pages };
    }
    if (typeof r.ellipsis === 'number') {
      if (r.start === 1) {
        pages.push(1); pages.push(2); pages.push(3); pages.push(4); pages.push(5);
        pages.push(-1);
        pages.push(total);
      } else {
        pages.push(1);
        pages.push(-1);
        for (var j = r.start; j <= r.end; j++) pages.push(j);
      }
      return { start: 1, end: total, pages: pages };
    }
    for (var k = r.start; k <= r.end; k++) pages.push(k);
    return { start: r.start, end: r.end, pages: pages };
  };

  // Override renderPagination to use the new range
  var origRenderPagination = renderPagination;
  renderPagination = function (totalPages) {
    if (totalPages <= 1) { $pagination.innerHTML = ''; return; }
    var r = getPageRange(currentPage, totalPages);
    var html = '';
    html += '<button class="page-btn' + (currentPage <= 1 ? ' disabled' : '') + '" data-page="' + (currentPage - 1) + '"' + (currentPage <= 1 ? ' disabled' : '') + '>&#x2039;</button>';
    (r.pages || []).forEach(function (i) {
      if (i === -1) { html += '<span class="page-ellipsis">…</span>'; return; }
      html += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
    });
    html += '<button class="page-btn' + (currentPage >= totalPages ? ' disabled' : '') + '" data-page="' + (currentPage + 1) + '"' + (currentPage >= totalPages ? ' disabled' : '') + '>&#x203A;</button>';
    $pagination.innerHTML = html;
    $pagination.querySelectorAll('.page-btn:not(.disabled)').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var p = parseInt(this.dataset.page);
        if (!isNaN(p) && p >= 1 && p <= totalPages) { currentPage = p; applyFilters(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
      });
    });
  };

  /* ---------- Fetch Data ---------- */
  function fetchProducts() {
    showLoading();
    var xhr = new XMLHttpRequest();
    xhr.open('GET', DATA_URL, true);
    xhr.timeout = 15000;
    xhr.onload = function () {
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          var apiResp = JSON.parse(xhr.responseText);
          var rawContent = atob(apiResp.content.replace(/\n/g, ''));
          var data = JSON.parse(rawContent);
          allProducts = Array.isArray(data) ? data : (data && Array.isArray(data.products) ? data.products : []);
          if (allProducts.length === 0) { showEmpty('暂无商品数据。'); return; }
          buildCategories(allProducts);
          applyFilters();
        } catch (e) { showError(); }
      } else { showError(); }
    };
    xhr.onerror = showError;
    xhr.ontimeout = showError;
    xhr.send();
  }

  $retryBtn.addEventListener('click', fetchProducts);
  fetchProducts();

  /* ---------- Contact Modal ---------- */
  var $modal = document.getElementById("contactModal");
  var $modalTitle = document.getElementById("modalProductTitle");
  var $modalPhone = document.getElementById("modalPhone");
  var $modalWechat = document.getElementById("modalWechat");
  var $modalClose = document.getElementById("modalClose");

  function openContactModal(data) {
    $modalTitle.textContent = "📦 " + (data.title || "联系商家");
    $modalPhone.textContent = data.phone || "未填写";
    $modalWechat.textContent = data.wechat || "未填写";
    $modal.classList.add("active");
  }

  $modalClose.addEventListener("click", function () {
    $modal.classList.remove("active");
  });
  $modal.addEventListener("click", function (e) {
    if (e.target === $modal) $modal.classList.remove("active");
  });

  /* Copy to clipboard */
  document.querySelectorAll(".copy-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var field = this.dataset.copy;
      var text = field === "phone" ? $modalPhone.textContent : $modalWechat.textContent;
      if (text === "未填写") return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () {
          var orig = this.textContent;
          this.textContent = "已复制";
          this.classList.add("copied");
          var self = this;
          setTimeout(function () {
            self.textContent = orig;
            self.classList.remove("copied");
          }, 1500);
        }.bind(this)).catch(function () { fallbackCopy(text, this); }.bind(this));
      } else {
        fallbackCopy(text, this);
      }
    });
  });

  function fallbackCopy(text, btn) {
    var ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); btn.textContent = "已复制"; btn.classList.add("copied");
      setTimeout(function () { btn.textContent = "复制"; btn.classList.remove("copied"); }, 1500);
    } catch (e) {}
    document.body.removeChild(ta);
  }
})();
</script>
</body>
