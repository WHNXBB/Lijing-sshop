backend:
  name: github
  repo: WHNXBB/Lijing-sshop
  branch: main

media_folder: "assets/images/products"
public_folder: "/assets/images/products"

collections:
  - name: "products"
    label: "商品管理"
    label_singular: "商品"
    folder: "/"
    extension: json
    format: json
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} — ¥{{price}}"
    fields:
      - label: "商品名称"
        name: "title"
        widget: "string"
        required: true
      - label: "价格"
        name: "price"
        widget: "string"
        required: true
      - label: "商品描述"
        name: "description"
        widget: "text"
        required: true
      - label: "分类"
        name: "category"
        widget: "string"
        required: false
      - label: "厂家电话"
        name: "phone"
        widget: "string"
        required: false
      - label: "厂家微信"
        name: "wechat"
        widget: "string"
        required: false
      - label: "商品主图"
        name: "image"
        widget: "image"
        required: true
