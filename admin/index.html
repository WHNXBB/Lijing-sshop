<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>后台管理</title>
  <link rel="cms-config-url" href="/admin/config.yml">
</head>
<body>
  <div id="cms-loading" style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#666;">
    <p>正在加载后台管理面板…</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@sveltia/cms@0.171.1/dist/sveltia-cms.js"></script>

  <script>
    // 捕获 CMS 加载完成事件
    document.addEventListener('sveltia-cms-loaded', function () {
      var el = document.getElementById('cms-loading');
      if (el) el.style.display = 'none';
    });

    // 捕获全局未捕获错误并在页面显示
    window.addEventListener('error', function (e) {
      var el = document.getElementById('cms-loading');
      if (el) {
        el.innerHTML = '<div style="color:#c00;text-align:center;padding:40px;">'
          + '<h2>加载错误</h2>'
          + '<pre style="font-size:13px;max-width:600px;text-align:left;background:#f5f5f5;padding:16px;border-radius:8px;overflow:auto;">'
          + (e.message || e.error?.message || '未知错误')
          + '</pre></div>';
      }
    });
  </script>
</body>
</html>
